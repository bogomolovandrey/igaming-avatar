# ─────────────────────────────────────────────────────────────────
# Дефолтные payload'ы для admin-кнопок. Админ кликает — backend
# применяет соответствующий payload без ввода данных.
# ─────────────────────────────────────────────────────────────────
trigger_presets:
  big_win:
    matchId: m_real_barca
    line: "Обе забьют + ТБ 2.5"
    stake: 100
    odds: 5.20
    payout: 520

  loss_streak:
    count: 5
    total_loss: 340
    notable: "пенальти на 95-й минуте в последней"

  freebet_expiring:
    bonusId: freebet_10
