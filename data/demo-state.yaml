# Avatar AI Demo — единый источник истины.
# Парсится одинаково backend'ом (pydantic) и frontend'ом (js-yaml через
# scripts/gen_frontend_state.mjs → frontend/lib/demo-state.ts).
#
# Меняешь здесь — меняется и в LLM-контексте, и в букмекерской вёрстке.

