services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=${BACKEND_URL}
        - NEXT_PUBLIC_WS_URL=${BACKEND_WS_URL}
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${BACKEND_URL}
      - NEXT_PUBLIC_WS_URL=${BACKEND_WS_URL}
      # Container listens on $PORT (Next.js default env). Same value
      # inside and outside — Coolify Caddy uses the compose port as
      # upstream target.
      - PORT=${FRONTEND_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      # uvicorn binds to $BACKEND_PORT — same value inside/outside.
      - BACKEND_PORT=${BACKEND_PORT}
      # optional behavioral overrides
      - GEMINI_TTS_MODEL
      - GEMINI_VOICE
      - GEMINI_TTS_PREFIX
      - CARTESIA_MODEL
      - CARTESIA_VOICE_ID
      - DEEPGRAM_MODEL
      - TTS_MODEL
      - ANAM_API_KEY=${ANAM_API_KEY}
      - ANAM_AVATAR_ID=${ANAM_AVATAR_ID}
      - ANAM_VOICE_ID=${ANAM_VOICE_ID}
      - ANAM_LANGUAGE_CODE=${ANAM_LANGUAGE_CODE}
      - ANAM_LLM_ID=${ANAM_LLM_ID}
      - ANAM_MAX_SESSION_SECONDS=${ANAM_MAX_SESSION_SECONDS}
    volumes:
      - ./secrets:/secrets:ro
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    restart: unless-stopped
